	  <script>
	    const API_URL = 'https://script.google.com/macros/s/AKfycbyfQUpog4dd7pHx_2GlLFcrb4mT6gBLRPlFKnjkGcClr9UzT-SdCSwyREENhoo3iOeXMA/exec';
	    const DISPLAY_ROW_COUNT = 6;
	    const FORECAST_DAYS = 7;
	    const HANOI_LAT = 21.0285;
	    const HANOI_LON = 105.8542;
	    let rowData = [];
    const statuses = ['Available', 'Busy', 'Offline'];
  
    async function fetchDataFromSheet() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('Failed to fetch data');
        const data = await res.json();
  
        rowData = data.slice(0, DISPLAY_ROW_COUNT).map(item => ({
          name1: item.name1 || '',
          status1: item.status1 || '',
          location1: item.location1 || '',
          name2: item.name2 || '',
          status2: item.status2 || '',
          location2: item.location2 || ''
        }));
  
        while (rowData.length < DISPLAY_ROW_COUNT) {
          rowData.push({
            name1: '',
            status1: 'Offline',
            location1: '',
            name2: '',
            status2: 'Offline',
            location2: ''
          });
        }
  
        fillTable();
      } catch (error) {
        console.error("❌ Lỗi fetch từ Sheet:", error);
        alert('Failed to load data. Please try again.');
      }
    }
  
    function createRow(data) {
      return `
      <tr>
        <td>${data.name1}</td>
        <td>${data.status1}</td>
        <td>${data.location1}</td>
        <td>${data.name2}</td>
        <td>${data.status2}</td>
        <td>${data.location2}</td>
      </tr>`;
    }
  
	    function fillTable() {
	      const tbody = document.getElementById("table-body");
	      tbody.innerHTML = "";
	      rowData.forEach(data => {
	        tbody.innerHTML += createRow(data);
	      });
	    }

	    function getForecastLabel(dateString, index) {
	      if (index === 0) return "Today";
	      if (index === 1) return "Tomorrow";

	      return new Date(dateString).toLocaleDateString("en-US", {
	        weekday: "short"
	      });
	    }

	    function getWeatherVisual(code) {
	      if (code === 0) return { icon: "&#9728;", label: "Sunny" };
	      if ([1, 2].includes(code)) return { icon: "&#9925;", label: "Partly cloudy" };
	      if (code === 3) return { icon: "&#9729;", label: "Cloudy" };
	      if ([45, 48].includes(code)) return { icon: "&#127787;", label: "Fog" };
	      if ([51, 53, 55, 56, 57].includes(code)) return { icon: "&#127783;", label: "Drizzle" };
	      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return { icon: "&#127783;", label: "Rain" };
	      if ([71, 73, 75, 77, 85, 86].includes(code)) return { icon: "&#10052;", label: "Snow" };
	      if ([95, 96, 99].includes(code)) return { icon: "&#9928;", label: "Storm" };
	      return { icon: "&#9925;", label: "Forecast" };
	    }

	    function createForecastDayCells(forecast) {
	      return forecast.map((day, index) =>
	        `<th class="forecast-day">${getForecastLabel(day.time, index)}</th>`
	      ).join("");
	    }

	    function createForecastRow(label, className, values) {
	      return `
	      <tr>
	        <td class="weather-label-cell">${label}</td>
	        ${values.map(value => `<td class="${className}">${value}</td>`).join("")}
	      </tr>`;
	    }

	    function renderForecastTable(forecast) {
	      const head = document.getElementById("forecast-head");
	      const body = document.getElementById("forecast-body");

	      head.innerHTML = `
	        <tr>
	          <th></th>
	          ${createForecastDayCells(forecast)}
	        </tr>`;

	      const weatherCells = forecast.map(day => {
	        const visual = getWeatherVisual(day.weatherCode);
	        return `
	          <span class="forecast-icon">${visual.icon}</span>
	          <span class="forecast-summary">${visual.label}</span>`;
	      });

	      const maxCells = forecast.map(day => `${day.maxTemp.toFixed(1)}&deg;C`);
	      const minCells = forecast.map(day => `${day.minTemp.toFixed(1)}&deg;C`);

	      body.innerHTML =
	        createForecastRow("Weather", "", weatherCells) +
	        createForecastRow("Max", "temp-max", maxCells) +
	        createForecastRow("Min", "temp-min", minCells);
	    }

	    function renderForecastFallback() {
	      const forecast = Array.from({ length: FORECAST_DAYS }, (_, index) => ({
	        time: new Date(Date.now() + index * 86400000).toISOString().split("T")[0]
	      }));
	      const head = document.getElementById("forecast-head");
	      const body = document.getElementById("forecast-body");

	      head.innerHTML = `
	        <tr>
	          <th></th>
	          ${createForecastDayCells(forecast)}
	        </tr>`;

	      body.innerHTML =
	        createForecastRow("Weather", "", Array.from({ length: FORECAST_DAYS }, () => "---")) +
	        createForecastRow("Max", "temp-max", Array.from({ length: FORECAST_DAYS }, () => "---")) +
	        createForecastRow("Min", "temp-min", Array.from({ length: FORECAST_DAYS }, () => "---"));
	    }

	    async function updateForecast() {
	      const url =
	        "https://api.open-meteo.com/v1/forecast" +
	        "?latitude=" + HANOI_LAT +
	        "&longitude=" + HANOI_LON +
	        "&daily=weather_code,temperature_2m_max,temperature_2m_min" +
	        "&forecast_days=" + FORECAST_DAYS +
	        "&timezone=Asia/Ho_Chi_Minh";

	      try {
	        const res = await fetch(url);
	        if (!res.ok) throw new Error("Forecast API error");

	        const data = await res.json();
	        const forecast = data.daily.time.map((time, index) => ({
	          time,
	          weatherCode: data.daily.weather_code[index],
	          maxTemp: data.daily.temperature_2m_max[index],
	          minTemp: data.daily.temperature_2m_min[index]
	        }));

	        renderForecastTable(forecast);
	      } catch (error) {
	        console.error("Forecast error:", error);
	        renderForecastFallback();
	      }
	    }

function updateDate() {
  try {
    const now = new Date();

    if (isNaN(now.getTime())) {
      throw new Error("Invalid local date");
    }

    document.getElementById("date").textContent =
      now.toLocaleDateString('vi-VN');

    document.getElementById("week").textContent =
      "Week " + getWeekNumber(now);

  } catch (error) {
    console.error("Date error:", error);
    document.getElementById("date").textContent = "---";
    document.getElementById("week").textContent = "---";
  }
}

    
    function getWeekNumber(date) {
      const start = new Date(date.getFullYear(), 0, 1);
      const diff = date - start + ((start.getTimezoneOffset() - date.getTimezoneOffset()) * 60000);
      const oneWeek = 604800000;
      return Math.floor(diff / oneWeek) + 1;
    }

	    async function updateWeather() {
	  const lat = HANOI_LAT;   // Hanoi
	  const lon = HANOI_LON;  // Hanoi

  const url =
    "https://api.open-meteo.com/v1/forecast" +
    "?latitude=" + lat +
    "&longitude=" + lon +
    "&hourly=temperature_2m,relativehumidity_2m" +
    "&timezone=Asia/Ho_Chi_Minh";

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("Weather API error");

    const data = await res.json();

    const now = new Date();

    // Làm tròn về đầu giờ
    now.setMinutes(0, 0, 0);

    const isoHour =
      now.getFullYear() + "-" +
      String(now.getMonth() + 1).padStart(2, "0") + "-" +
      String(now.getDate()).padStart(2, "0") + "T" +
      String(now.getHours()).padStart(2, "0") + ":00";

    const idx = data.hourly.time.indexOf(isoHour);

    if (idx === -1) throw new Error("Hour not found");

    const temperature = data.hourly.temperature_2m[idx];
    const humidity = data.hourly.relativehumidity_2m[idx];

    document.getElementById("weather").textContent =
      temperature + "°C | " + humidity + "% RH";

    document.getElementById("weather-icon").src =
      "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";

  } catch (err) {
    console.error("Weather error:", err);
    document.getElementById("weather").textContent = "---";
  }
}
